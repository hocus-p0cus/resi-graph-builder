name: Update Resi Graphs

on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Season identifier (e.g., tww-season3)'
        required: true
        default: 'mn-season1'
        type: string
      resi_key_level:
        description: 'Min key level'
        required: true
        default: '12'
        type: string

  schedule:
    - cron: "0 10 * * *"

jobs:
  analyze:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        region: [eu, na]

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Clone private DB repo
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/hocus-p0cus/mplus-data-fetcher.git db_repo

      - name: Copy DB files
        run: cp db_repo/*_mapped.db .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis for region ${{ matrix.region }}
        env:
          SEASON: ${{ inputs.season || vars.SEASON || 'mn-season1' }}
          RESI_LEVEL: ${{ inputs.resi_key_level || vars.RESI_KEY_LEVEL || '12' }}
        run: |
          python main.py \
            --region ${{ matrix.region }} \
            --season ${SEASON} \
            --resi-key-level ${RESI_LEVEL}

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.region }}
          path: |
            *_timestamps.json
            *_down_edges.json
            *_non_resil_edges.json

  push-results:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Push updated data to visualization repo
        env:
          VIS_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          SEASON: ${{ inputs.season || vars.SEASON || 'mn-season1' }}
        run: |
          git clone https://x-access-token:${VIS_TOKEN}@github.com/hocus-p0cus/resil-visualization.git viz_repo
          
          # Process both regions
          for region in eu na; do
            mkdir -p viz_repo/public/data/${region}/${SEASON}
            if [ -d "artifacts/results-${region}" ]; then
              cp artifacts/results-${region}/*.json viz_repo/public/data/${region}/${SEASON}/ 2>/dev/null || true
            fi
          done
          
          cd viz_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if ! git diff --cached --quiet; then
            git commit -m "Update edges for ${SEASON} (both regions)"
            git push origin main
          else
            echo "No changes to commit"
          fi